<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Genesis — Tienda de Ropa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #faf9f7; color: #1a1a1a; }
  a { text-decoration: none; color: inherit; }

  /* HEADER */
  header { position: sticky; top: 0; z-index: 100; background: #1a1a1a; color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 22px; font-weight: bold; letter-spacing: 3px; }
  nav { display: flex; gap: 24px; }
  nav button { background: none; border: none; color: #ccc; font-size: 14px; cursor: pointer; padding: 6px 10px; border-radius: 4px; }
  nav button.active, nav button:hover { color: white; background: #333; }
  .cart-icon { position: relative; background: none; border: 1px solid #555; color: white; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 14px; }
  .cart-count { position: absolute; top: -8px; right: -8px; background: #e74c3c; color: white; font-size: 11px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

  /* HERO */
  .hero { background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url('https://picsum.photos/seed/nova-hero/1400/500') center/cover; color: white; padding: 100px 32px; text-align: center; }
  .hero h1 { font-size: 42px; margin-bottom: 10px; letter-spacing: 2px; }
  .hero p { font-size: 16px; color: #eee; }

  /* CATALOG */
  .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  .catalog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .catalog-header h2 { font-size: 24px; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filters button { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 20px; cursor: pointer; font-size: 13px; }
  .filters button.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
  .product-card { background: white; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #eee; }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
  .product-img { width: 100%; height: 280px; object-fit: cover; display: block; background: #eee; }
  .product-info { padding: 14px 16px; }
  .product-info .tag { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
  .product-info h3 { font-size: 15px; margin: 4px 0 6px; }
  .product-info .price { font-size: 16px; font-weight: bold; }
  .product-info .old-price { font-size: 13px; color: #999; text-decoration: line-through; margin-left: 6px; font-weight: normal; }

  /* MODAL PRODUCTO */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }
  .modal { background: white; max-width: 800px; width: 90%; border-radius: 12px; display: flex; overflow: hidden; max-height: 85vh; }
  .modal img { width: 45%; object-fit: cover; }
  .modal-body { padding: 30px; flex: 1; overflow-y: auto; }
  .modal-body .tag { font-size: 12px; color: #999; text-transform: uppercase; }
  .modal-body h2 { font-size: 24px; margin: 8px 0; }
  .modal-body .price { font-size: 20px; font-weight: bold; margin-bottom: 16px; display: block; }
  .modal-body p.desc { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
  .size-options { display: flex; gap: 8px; margin-bottom: 20px; }
  .size-options button { width: 42px; height: 42px; border: 1px solid #ccc; background: white; border-radius: 6px; cursor: pointer; }
  .size-options button.selected { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .modal-body .btn-add { background: #1a1a1a; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.9); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; }

  /* CARRITO LATERAL */
  .cart-drawer { position: fixed; top: 0; right: -400px; width: 380px; height: 100%; background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.15); z-index: 300; transition: right 0.3s; display: flex; flex-direction: column; }
  .cart-drawer.open { right: 0; }
  .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .cart-header h3 { font-size: 18px; }
  .cart-header button { background: none; border: none; font-size: 20px; cursor: pointer; }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .cart-item { display: flex; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; }
  .cart-item img { width: 64px; height: 80px; object-fit: cover; border-radius: 6px; }
  .cart-item-info { flex: 1; }
  .cart-item-info h4 { font-size: 14px; margin-bottom: 4px; }
  .cart-item-info .meta { font-size: 12px; color: #888; margin-bottom: 6px; }
  .qty-controls { display: flex; align-items: center; gap: 8px; }
  .qty-controls button { width: 24px; height: 24px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; }
  .remove-btn { font-size: 12px; color: #e74c3c; background: none; border: none; cursor: pointer; margin-left: auto; }
  .cart-footer { padding: 20px; border-top: 1px solid #eee; }
  .cart-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-bottom: 14px; }
  .checkout-btn { width: 100%; background: #1a1a1a; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .empty-cart { text-align: center; color: #999; padding: 60px 20px; font-size: 14px; }
  .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 250; }
  .backdrop.show { display: block; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 400; opacity: 0; transition: all 0.3s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">GENESIS</div>
  <nav id="navFilters"></nav>
  <button class="cart-icon" onclick="toggleCart(true)">🛒 Carrito <span class="cart-count" id="cartCount">0</span></button>
</header>

<div class="hero">
  <h1>Colección Primavera 2026</h1>
  <p>Ropa con estilo, para cada día</p>
</div>

<div class="container">
  <div class="catalog-header">
    <h2 id="catalogTitle">Todos los productos</h2>
    <div class="filters" id="filterButtons"></div>
  </div>
  <div class="grid" id="productGrid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modalImg" src="">
    <div class="modal-body">
      <div class="tag" id="modalTag"></div>
      <h2 id="modalName"></h2>
      <span class="price" id="modalPrice"></span>
      <p class="desc" id="modalDesc"></p>
      <div>
        <p style="font-size:13px; margin-bottom:8px; color:#555;">Talle</p>
        <div class="size-options" id="modalSizes"></div>
      </div>
      <button class="btn-add" onclick="addToCartFromModal()">Agregar al carrito</button>
    </div>
  </div>
</div>

<!-- CARRITO -->
<div class="backdrop" id="backdrop" onclick="toggleCart(false)"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h3>Tu carrito</h3>
    <button onclick="toggleCart(false)">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><span id="cartTotal">$0</span></div>
    <button class="checkout-btn" onclick="checkout()">Finalizar compra</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const productos = [
  { id: 1, nombre: 'Campera de jean oversize', categoria: 'Camperas', precio: 45000, precioAnterior: 58000, img: 'https://picsum.photos/seed/nova1/500/650', desc: 'Campera de jean estilo oversize, ideal para looks casuales de entretiempo.' },
  { id: 2, nombre: 'Remera básica algodón', categoria: 'Remeras', precio: 12000, img: 'https://picsum.photos/seed/nova2/500/650', desc: 'Remera de algodón 100%, corte clásico, disponible en varios colores.' },
  { id: 3, nombre: 'Pantalón cargo', categoria: 'Pantalones', precio: 38000, img: 'https://picsum.photos/seed/nova3/500/650', desc: 'Pantalón cargo con bolsillos laterales, tela resistente y cómoda.' },
  { id: 4, nombre: 'Vestido floreado', categoria: 'Vestidos', precio: 32000, img: 'https://picsum.photos/seed/nova4/500/650', desc: 'Vestido liviano con estampa floral, perfecto para primavera.' },
  { id: 5, nombre: 'Buzo con capucha', categoria: 'Camperas', precio: 28000, img: 'https://picsum.photos/seed/nova5/500/650', desc: 'Buzo canguro con capucha, friza interior, ideal para días frescos.' },
  { id: 6, nombre: 'Camisa a rayas', categoria: 'Remeras', precio: 22000, img: 'https://picsum.photos/seed/nova6/500/650', desc: 'Camisa de vestir a rayas, corte slim fit.' },
  { id: 7, nombre: 'Jean recto azul', categoria: 'Pantalones', precio: 41000, img: 'https://picsum.photos/seed/nova7/500/650', desc: 'Jean de corte recto, lavado azul clásico, tiro medio.' },
  { id: 8, nombre: 'Vestido negro elegante', categoria: 'Vestidos', precio: 47000, precioAnterior: 55000, img: 'https://picsum.photos/seed/nova8/500/650', desc: 'Vestido negro para ocasiones especiales, tela con caída suave.' },
];

const categorias = ['Todos', ...new Set(productos.map(p => p.categoria))];
let filtroActual = 'Todos';
let carrito = []; // en memoria — se reinicia al recargar
let productoModal = null;
let tallaSeleccionada = null;
const tallas = ['S', 'M', 'L', 'XL'];

function renderNav() {
  const nav = document.getElementById('navFilters');
  nav.innerHTML = categorias.map(c => `<button onclick="filtrar('${c}')" class="${c===filtroActual?'active':''}">${c}</button>`).join('');
}

function renderFilterButtons() {
  document.getElementById('filterButtons').innerHTML = categorias.map(c =>
    `<button onclick="filtrar('${c}')" class="${c===filtroActual?'active':''}">${c}</button>`).join('');
}

function filtrar(cat) {
  filtroActual = cat;
  document.getElementById('catalogTitle').textContent = cat === 'Todos' ? 'Todos los productos' : cat;
  renderNav();
  renderFilterButtons();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('productGrid');
  const lista = filtroActual === 'Todos' ? productos : productos.filter(p => p.categoria === filtroActual);
  grid.innerHTML = lista.map(p => `
    <div class="product-card" onclick="openModal(${p.id})">
      <img class="product-img" src="${p.img}">
      <div class="product-info">
        <div class="tag">${p.categoria}</div>
        <h3>${p.nombre}</h3>
        <div class="price">$${p.precio.toLocaleString('es-AR')}${p.precioAnterior ? `<span class="old-price">$${p.precioAnterior.toLocaleString('es-AR')}</span>` : ''}</div>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  productoModal = productos.find(p => p.id === id);
  tallaSeleccionada = null;
  document.getElementById('modalImg').src = productoModal.img;
  document.getElementById('modalTag').textContent = productoModal.categoria;
  document.getElementById('modalName').textContent = productoModal.nombre;
  document.getElementById('modalPrice').textContent = '$' + productoModal.precio.toLocaleString('es-AR');
  document.getElementById('modalDesc').textContent = productoModal.desc;
  document.getElementById('modalSizes').innerHTML = tallas.map(t =>
    `<button onclick="seleccionarTalla('${t}', this)">${t}</button>`).join('');
  document.getElementById('overlay').classList.add('show');
}

function seleccionarTalla(t, btn) {
  tallaSeleccionada = t;
  document.querySelectorAll('.size-options button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
}

function addToCartFromModal() {
  if (!tallaSeleccionada) {
    mostrarToast('Elegí un talle primero');
    return;
  }
  const existente = carrito.find(i => i.id === productoModal.id && i.talla === tallaSeleccionada);
  if (existente) {
    existente.cantidad++;
  } else {
    carrito.push({ ...productoModal, talla: tallaSeleccionada, cantidad: 1 });
  }
  renderCart();
  closeModal();
  mostrarToast('Producto agregado al carrito');
}

function renderCart() {
  const cont = document.getElementById('cartItems');
  const count = carrito.reduce((a, i) => a + i.cantidad, 0);
  document.getElementById('cartCount').textContent = count;

  if (carrito.length === 0) {
    cont.innerHTML = '<div class="empty-cart">Tu carrito está vacío</div>';
  } else {
    cont.innerHTML = carrito.map((item, idx) => `
      <div class="cart-item">
        <img src="${item.img}">
        <div class="cart-item-info">
          <h4>${item.nombre}</h4>
          <div class="meta">Talle: ${item.talla} · $${item.precio.toLocaleString('es-AR')}</div>
          <div class="qty-controls">
            <button onclick="cambiarCantidad(${idx}, -1)">−</button>
            <span>${item.cantidad}</span>
            <button onclick="cambiarCantidad(${idx}, 1)">+</button>
            <button class="remove-btn" onclick="quitarDelCarrito(${idx})">Quitar</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  const total = carrito.reduce((a, i) => a + i.precio * i.cantidad, 0);
  document.getElementById('cartTotal').textContent = '$' + total.toLocaleString('es-AR');
}

function cambiarCantidad(idx, delta) {
  carrito[idx].cantidad += delta;
  if (carrito[idx].cantidad <= 0) carrito.splice(idx, 1);
  renderCart();
}

function quitarDelCarrito(idx) {
  carrito.splice(idx, 1);
  renderCart();
}

function toggleCart(open) {
  document.getElementById('cartDrawer').classList.toggle('open', open);
  document.getElementById('backdrop').classList.toggle('show', open);
}

function checkout() {
  if (carrito.length === 0) {
    mostrarToast('Tu carrito está vacío');
    return;
  }
  mostrarToast('¡Compra realizada con éxito!');
  carrito = [];
  renderCart();
  toggleCart(false);
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

renderNav();
renderFilterButtons();
renderGrid();
renderCart();
</script>

</body>
</html>
